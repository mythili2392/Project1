name: CI-CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clone repo if not exists
            if [ ! -d "tempify" ]; then
              git clone https://github.com/Abineshwari-Balan/tempify.git
            fi

            cd tempify

            # Pull latest code
            git pull origin main

            # Stop any service using port 80 (like nginx)
            sudo systemctl stop nginx || true
            sudo systemctl stop httpd || true

            # Stop & remove old container
            docker stop temptify || true
            docker rm temptify || true

            # Remove old image (optional but clean)
            docker rmi temptify || true

            # Build new image
            docker build -t temptify .

            # Run new container
            docker run -d -p 80:80 --name temptify temptify
